title: Data Engineering Bootcamp
tags:
  - concepts:big-data
  - concepts:databases
  - languages:python
  - infrastructure:cloud
level: intermediate
category: data-engineering
duration_hours: 320
audience:
  - audiences:data-engineers
  - audiences:developers
description: >
  An intensive bootcamp covering the full data engineering stack. Students learn
  Python for data processing, SQL and database design, data pipeline orchestration,
  stream processing, cloud data platforms, and data governance. The course emphasizes
  hands-on work with modern tools used in production data teams.
intended_audience:
  - Developers transitioning into data engineering roles.
  - Data analysts who want to build production data pipelines.
  - Backend engineers expanding into data infrastructure.
prerequisites:
  - Programming experience in at least one language.
  - Basic understanding of SQL.
objectives:
  - Build and orchestrate data pipelines with Apache Airflow
  - Process large datasets with PySpark and Apache Flink
  - Design data warehouses and data lakes
  - Implement stream processing with Kafka
  - Use cloud data services on AWS
  - Apply data governance and quality practices
